<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 260px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: white;
        padding: 16px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .header h1 { font-size: 0.95rem; font-weight: 600; }
      .header p { font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #1e293b;
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 10px;
      }
      .toggle-label { font-size: 0.85rem; }
      .toggle {
        position: relative;
        width: 40px;
        height: 22px;
      }
      .toggle input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        inset: 0;
        background: #334155;
        border-radius: 22px;
        cursor: pointer;
        transition: 0.2s;
      }
      .slider:before {
        content: '';
        position: absolute;
        width: 16px; height: 16px;
        left: 3px; top: 3px;
        background: white;
        border-radius: 50%;
        transition: 0.2s;
      }
      input:checked + .slider { background: #2563eb; }
      input:checked + .slider:before { transform: translateX(18px); }
      .status {
        font-size: 0.72rem;
        color: #64748b;
        text-align: center;
      }
      .status span { color: #22c55e; }
      .features {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .feature {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        font-size: 0.75rem;
        color: #94a3b8;
      }
      .feature strong { color: #e2e8f0; }
      .divider { border: none; border-top: 1px solid #1e293b; margin: 12px 0; }
      .section-label { font-size: 0.7rem; color: #64748b; margin-bottom: 6px; }
      .password-row {
        display: flex;
        gap: 6px;
        margin-bottom: 6px;
      }
      .password-row input {
        flex: 1;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 6px;
        color: white;
        padding: 6px 10px;
        font-size: 0.8rem;
        outline: none;
      }
      .password-row input:focus { border-color: #2563eb; }
      .password-row button {
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 0.8rem;
        cursor: pointer;
      }
      .password-row button:hover { background: #1d4ed8; }
      .password-saved { font-size: 0.7rem; color: #22c55e; display: none; }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1>PromptShield</h1>
        <p>+ AIGroomDetect</p>
      </div>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Protection active</span>
      <label class="toggle">
        <input type="checkbox" id="toggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <p class="status" id="status">Backend: <span>checking...</span></p>

    <div class="features">
      <div class="feature">🔒 <span><strong>PromptShield</strong> — redacts PII before sending</span></div>
      <div class="feature">⚠️ <span><strong>AIGroomDetect</strong> — flags manipulative replies</span></div>
      <div class="feature">🖼️ <span><strong>NSFW Blur</strong> — blurs unsafe images on all sites</span></div>
      <div class="feature">🏠 <span>All inference runs <strong>locally</strong> — no cloud</span></div>
    </div>

    <hr class="divider" />

    <p class="section-label">Parental control password</p>
    <div class="password-row">
      <input type="password" id="password-input" placeholder="Set password" />
      <button id="password-save">Save</button>
    </div>
    <p class="password-saved" id="password-saved">Password saved!</p>

    <script src="popup.js"></script>
  </body>
</html>
